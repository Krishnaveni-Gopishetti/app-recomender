<!DOCTYPE html>
<html>
<body>

<h2>Smart App Recommender</h2>

<input id="age" placeholder="Age"><br>

<select id="edu">
<option>High School</option>
<option>Bachelor</option>
<option>Master</option>
</select><br>

<input id="internet" placeholder="Internet Hours"><br>

<select id="device">
<option>Mobile</option>
<option>Laptop</option>
<option>Tablet</option>
</select><br>

<input id="category" placeholder="Category"><br>

<button onclick="getApps()">Get Apps</button>

<div id="result"></div>

<script>
function getApps() {
document.getElementById("result").innerHTML="Loading...";

fetch("https://app-recomender-2.onrender.com/recommend",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
age:age.value,
education:edu.value,
internet_hours:internet.value,
device:device.value,
category:category.value
})
})
.then(res=>res.json())
.then(data=>{
let html=`<h3>Level: ${data.level}</h3>`;

html+="<h4>⭐ Recommended Apps</h4>";
data.recommended_apps.forEach(app=>{
html+=`<div>
<b>${app.name}</b><br>
⭐ ${app.rating}<br>
${app.status}<br>
${app.status.includes("Fake")?"🚫 Avoid":`<a href="${app.link}">Download</a>`}
</div><hr>`;
});

html+="<h4>📂 Category Apps</h4>";
data.category_apps.forEach(app=>{
html+=`<div>
<b>${app.name}</b><br>
⭐ ${app.rating}<br>
${app.status}<br>
${app.status.includes("Fake")?"🚫 Avoid":`<a href="${app.link}">Download</a>`}
</div><hr>`;
});

result.innerHTML=html;
});
}
</script>

</body>
</html>
