<!DOCTYPE html>
<html>
<body>

<h2>Smart App Recommender</h2>

<input id="age" placeholder="Age"><br>

<select id="edu">
  <option>High School</option>
  <option>Bachelor</option>
  <option>Master</option>
</select><br>

<input id="internet" placeholder="Internet Hours"><br>

<select id="device">
  <option>Mobile</option>
  <option>Laptop</option>
  <option>Tablet</option>
</select><br>

<input id="category" placeholder="Category"><br>

<button onclick="getApps()">Get Apps</button>

<p id="result"></p>

<script>
function getApps() {
  document.getElementById("result").innerText = "Loading...";

  fetch("https://app-recomender-2.onrender.com/recommend", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      age: document.getElementById("age").value,
      education: document.getElementById("edu").value,
      internet_hours: document.getElementById("internet").value,
      device: document.getElementById("device").value,
      category: document.getElementById("category").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      document.getElementById("result").innerText = "Error: " + data.error;
    } else {
      document.getElementById("result").innerText =
        "Level: " + data.level + "\nApps: " + data.personalized_apps.join(", ");
    }
  })
  .catch(err => {
    document.getElementById("result").innerText = "Error connecting to server";
  });
}
</script>

</body>
</html>
